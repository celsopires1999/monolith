services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
      args:
        - USER_UID=${UID:-1000}
        - USER_GID=${GID:-1000}
        - DOCKER_GROUP_ID=${DOCKER_GROUP_ID:-999}
    volumes:
      - .:/home/developer/app
      - /var/run/docker.sock:/var/run/docker.sock
    tty: true

  postgres:
        image: postgres:16
        environment:
            POSTGRES_DB: hotel_reservation
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: Test1234
        ports:
            - "5432:5432"
        volumes:
            - postgres_data:/var/lib/postgresql/data
    
volumes:
    postgres_data: